name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1, and Node 22 still bundles npm 10.
      # Pinned to the 11.x line: npm 12.0.0 ships the @sigstore/* packages but its
      # libnpmpublish still does require('sigstore'), so publishing with provenance
      # dies with MODULE_NOT_FOUND. Revisit once 12.x can publish.
      - name: Update npm
        run: npm install -g npm@11

      # See the note in ci.yml: isolated-vm cannot be built here and is not needed.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify the tag matches the package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish
